<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WC 2026 Knockout Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .flag { width: 56px; height: 56px; border-radius: 9999px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: all 0.3s; flex-shrink: 0; }
        .flag:hover { transform: scale(1.1); }
        .match-card { transition: all 0.4s; overflow: hidden; }
        .match-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .selected { border-color: #22c55e !important; background-color: rgba(74, 222, 128, 0.1) !important; }
        .trophy { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <div class="max-w-7xl mx-auto p-6">
        <div class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-4">
                <div class="text-5xl trophy">🏆</div>
                <div>
                    <h1 class="text-4xl font-bold">WC 2026</h1>
                    <p class="text-zinc-400">Knockout Stage Predictor</p>
                </div>
            </div>
        </div>

        <!-- Login Screen -->
        <div id="login-screen" class="flex flex-col items-center justify-center min-h-[70vh]">
            <div class="text-center">
                <div class="inline-block p-8 bg-gradient-to-br from-amber-400 to-yellow-500 rounded-3xl mb-10 trophy">
                    <span class="text-8xl">🏆</span>
                </div>
                <h2 class="text-5xl font-bold mb-3">Make Your Predictions</h2>
                <p class="text-zinc-400 text-xl">Predict all knockout matches</p>
            </div>
            <div class="mt-12 w-full max-w-md">
                <input id="username-input" type="text" placeholder="Enter your username" 
                       class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-8 py-6 text-xl text-center outline-none focus:border-emerald-500">
                <button onclick="startPrediction()" 
                        class="mt-6 w-full bg-emerald-600 hover:bg-emerald-700 py-6 rounded-3xl text-xl font-semibold">
                    Start Predicting →
                </button>
            </div>
        </div>

        <!-- Main Predictor -->
        <div id="main-app" class="hidden">
            <div class="flex justify-between items-center mb-8">
                <div id="progress" class="text-emerald-400 font-semibold text-xl">0/16 matches predicted</div>
                <button onclick="generateBracketImage()" 
                        class="flex items-center gap-3 bg-white text-black px-8 py-4 rounded-3xl font-semibold hover:bg-gray-100">
                    <i class="fas fa-download"></i> Download My Bracket
                </button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <!-- Left -->
                <div>
                    <h2 class="text-2xl font-bold text-blue-400 text-center mb-6">LEFT BRACKET</h2>
                    <div id="left-bracket" class="space-y-5"></div>
                </div>
                <!-- Right -->
                <div>
                    <h2 class="text-2xl font-bold text-purple-400 text-center mb-6">RIGHT BRACKET</h2>
                    <div id="right-bracket" class="space-y-5"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
